<!DOCTYPE html>
<html>
<head>
<title>Fitness Dashboard</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
}

input, select {
    padding: 10px;
    border-radius: 10px;
    margin: 5px;
    border: none;
    width: 200px;
}

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #00ffcc;
    color: black;
    font-weight: bold;
}

li {
    margin: 10px;
}
</style>
</head>

<body>

<h2 id="userEmail"></h2>

<!-- PROFILE -->
<h3>Your Profile 👤</h3>
<input type="text" id="name" placeholder="Enter Name"><br>
<input type="number" id="age" placeholder="Enter Age"><br>
<input type="number" id="weight" placeholder="Enter Weight (kg)"><br>

<select id="goal">
  <option value="">Select Goal</option>
  <option value="weight_loss">Weight Loss</option>
  <option value="muscle_gain">Muscle Gain</option>
</select><br>

<button onclick="saveProfile()">Save Profile</button>

<h3 id="suggestion"></h3>

<!-- BMI + DIET -->
<h3>Your BMI 📊</h3>
<h2 id="bmi"></h2>

<h3>Diet Plan 🥗</h3>
<p id="diet"></p>

<!-- WORKOUT -->
<h3>Add Workout 💪</h3>
<input type="text" id="workout" placeholder="Enter workout"><br>
<button onclick="addWorkout()">Add</button>

<h3>Your Workouts 📊</h3>
<ul id="workoutList"></ul>

<!-- HISTORY -->
<h3>Workout History 📅</h3>
<div id="history"></div>

<br>
<button onclick="logout()">Logout</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  getFirestore, doc, setDoc, getDoc,
  collection, addDoc, getDocs, deleteDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBHz5CsOqycil6NDM0H5jChXmL8FfGBB7Y",
  authDomain: "healthy-fitness-67a98.firebaseapp.com",
  projectId: "healthy-fitness-67a98",
  storageBucket: "healthy-fitness-67a98.appspot.com",
  messagingSenderId: "560277054537",
  appId: "1:560277054537:web:06c37f4f2d99079e648b98"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOGIN CHECK
onAuthStateChanged(auth, async (user) => {
    if (user) {
        document.getElementById("userEmail").innerText =
            "Welcome " + user.email + " 🔥";

        loadProfile();
        loadWorkouts();
        updateHistory();
    } else {
        window.location.href = "index.html";
    }
});

// PROFILE SAVE
window.saveProfile = async function () {
    const user = auth.currentUser;

    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;
    const weight = document.getElementById("weight").value;
    const goal = document.getElementById("goal").value;

    await setDoc(doc(db, "users", user.uid), {
        name, age, weight, goal
    });

    calculateBMI(weight);
    showDiet(goal);
    showSuggestion(goal);

    alert("Profile Saved ✅");
};

// LOAD PROFILE
async function loadProfile() {
    const user = auth.currentUser;

    const snap = await getDoc(doc(db, "users", user.uid));

    if (snap.exists()) {
        let data = snap.data();

        document.getElementById("name").value = data.name || "";
        document.getElementById("age").value = data.age || "";
        document.getElementById("weight").value = data.weight || "";
        document.getElementById("goal").value = data.goal || "";

        calculateBMI(data.weight);
        showDiet(data.goal);
        showSuggestion(data.goal);
    }
}

// BMI
function calculateBMI(weight, height = 1.7) {
    let bmi = (weight / (height * height)).toFixed(2);
    document.getElementById("bmi").innerText = "BMI: " + bmi;
}

// DIET
function showDiet(goal) {
    let diet = "";

    if (goal === "weight_loss") {
        diet = "🥗 Eat fruits, avoid junk, drink water";
    } else if (goal === "muscle_gain") {
        diet = "🍗 Eat protein foods: eggs, milk, chicken";
    } else {
        diet = "Select goal to see diet";
    }

    document.getElementById("diet").innerText = diet;
}

// SUGGESTION
function showSuggestion(goal) {
    let text = "";

    if (goal === "weight_loss") {
        text = "🔥 Do cardio + running daily";
    } else if (goal === "muscle_gain") {
        text = "💪 Do pushups + strength training";
    } else {
        text = "Select goal";
    }

    document.getElementById("suggestion").innerText = text;
}

// ADD WORKOUT
window.addWorkout = async function () {
    const workout = document.getElementById("workout").value;
    const user = auth.currentUser;

    if (workout !== "") {
        await addDoc(collection(db, "users", user.uid, "workouts"), {
            name: workout
        });

        document.getElementById("workout").value = "";
        loadWorkouts();
    }
};

// LOAD WORKOUTS
async function loadWorkouts() {
    const user = auth.currentUser;

    const snap = await getDocs(collection(db, "users", user.uid, "workouts"));

    let list = document.getElementById("workoutList");
    list.innerHTML = "";

    snap.forEach((docItem) => {
        let li = document.createElement("li");

        li.innerHTML = docItem.data().name + 
        ` <button onclick="editWorkout('${docItem.id}','${docItem.data().name}')">✏️</button>
          <button onclick="deleteWorkout('${docItem.id}')">❌</button>`;

        list.appendChild(li);
    });
}

// DELETE
window.deleteWorkout = async function (id) {
    const user = auth.currentUser;
    await deleteDoc(doc(db, "users", user.uid, "workouts", id));
    loadWorkouts();
};

// EDIT
window.editWorkout = async function(id, oldName) {
    const user = auth.currentUser;

    let newName = prompt("Edit workout:", oldName);

    if (newName) {
        await updateDoc(doc(db, "users", user.uid, "workouts", id), {
            name: newName
        });

        loadWorkouts();
    }
};

// HISTORY
function updateHistory() {
    let container = document.getElementById("history");
    container.innerHTML = "";

    for (let i = 0; i < 30; i++) {
        let box = document.createElement("span");
        box.style.display = "inline-block";
        box.style.width = "12px";
        box.style.height = "12px";
        box.style.margin = "2px";
        box.style.background = "#555";

        container.appendChild(box);
    }
}

// REMINDER
setInterval(() => {
    alert("⏰ Time to workout 💪");
}, 60000);

// LOGOUT
window.logout = function () {
    signOut(auth).then(() => {
        window.location.href = "index.html";
    });
};

</script>
</body>
</html>
